# =============================================
# SatAlert - application-prod.properties
# Usado no Railway — ativa com: spring.profiles.active=prod
# As variaveis de ambiente sao configuradas no painel do Railway
# =============================================

server.port=${PORT:8080}

# Postgres (Railway injeta a DATABASE_URL automaticamente)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# create-drop na primeira vez, depois muda pra validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

jwt.secret=${JWT_SECRET:SatAlertSecretKeyParaJWTMuitoSegura2026FiapGlobalSolution}
jwt.expiration=86400000
